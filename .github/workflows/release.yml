name: Build precompiled NIFs

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.15"]
        job:
          - {
              target: arm-unknown-linux-gnueabihf,
              os: ubuntu-latest,
              use-cross: true,
            }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              use-cross: true,
            }
          - {
              target: aarch64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - {
              target: riscv64gc-unknown-linux-gnu,
              os: ubuntu-latest,
              use-cross: true,
            }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - {
              target: x86_64-unknown-linux-musl,
              os: ubuntu-latest,
              use-cross: true,
            }
          - { target: x86_64-pc-windows-gnu, os: windows-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          # Get the project version from mix.exs
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.job.target }}

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: qrcoderust_nif
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: "native/qrcoderust_nif"

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Upload archive to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
        if: startsWith(github.ref, 'refs/tags/')

  publish:
    name: Publish package to Hex
    runs-on: ubuntu-latest
    needs: build_release
    if: startsWith(github.ref, 'refs/tags/')
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      HEX_ORGANIZATION: ${{ vars.HEX_ORGANIZATION || secrets.HEX_ORGANIZATION }}
      MIX_ENV: prod

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Hex
        run: mix local.hex --force

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Validate release tag
        shell: bash
        run: |
          PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match mix.exs version '$PROJECT_VERSION'."
            exit 1
          fi

      - name: Validate Hex configuration
        shell: bash
        run: |
          if [ -z "$HEX_API_KEY" ]; then
            echo "Missing HEX_API_KEY GitHub secret."
            exit 1
          fi

          if [ -z "$HEX_ORGANIZATION" ]; then
            echo "Missing HEX_ORGANIZATION GitHub variable or secret."
            exit 1
          fi

      - name: Generate RustlerPrecompiled checksums
        env:
          QRCODE_RUST_BUILD: "true"
        run: mix rustler_precompiled.download QRCodeRust --all --print

      - name: Build Hex package
        run: mix hex.build

      - name: Publish package to private Hex organization
        run: mix hex.publish package --yes --organization "$HEX_ORGANIZATION"
